name: "Run all scripts"

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  execute:
    strategy:
      fail-fast: false
      matrix:
        jdk: [17, 21, 25]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
          check-latest: true
      - uses: gradle/actions/setup-gradle@v6
      - name: Run scripts with Gradle
        run: ./gradlew runAll -PjdkVersion=${{matrix.jdk}}
        timeout-minutes: 60
